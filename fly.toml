# Fly.io config for Critic Pipeline
# Run: fly launch (first time) then fly deploy

app = "ai-slop-critic"

[build]

[env]
  PORT = "7474"

[http_service]
  internal_port = 7474
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
